name: Refresh dashboard data and publish Pages

on:
  workflow_dispatch:
  schedule:
    # Every 30 days at 09:00 UTC, approximately monthly.
    - cron: '0 9 */30 * *'

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Update data
        run: python src/update_data.py
      - name: Build static site
        run: python src/build_static.py
      - name: Commit refreshed data/site if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "No data/site changes"
          else
            git commit -m "chore: refresh dashboard data"
            git push
          fi
  pages:
    needs: refresh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - uses: actions/deploy-pages@v4
